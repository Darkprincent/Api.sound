<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мои треки</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #1a0a2e; color: white; padding: 30px; }
        .btn-purple { background: #6a4bc2; color: white; }
        .btn-purple:hover { background: #8261e1; }
        .table-glass { background: rgba(255,255,255,0.05); border-radius: 15px; }
        .form-card { background: rgba(20,10,40,0.8); border: 1px solid #6a4bc2; border-radius: 20px; padding: 25px; margin-top: 30px; }
        .form-control { background: rgba(255,255,255,0.05); border-color: #4a308d; color: white; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="color: #d1b3ff;" class="mb-4">🎵 Мои треки</h1>

    <div class="table-responsive table-glass p-3">
        <table class="table table-dark table-hover align-middle">
            <thead>
            <tr><th>ID</th><th>Название</th><th>Автор</th><th>Действия</th></tr>
            </thead>
            <tbody id="track-list">
            </tbody>
        </table>
    </div>

    <div class="form-card">
        <h3 id="formTitle" style="color: #d1b3ff;">➕ Добавить трек</h3>
        <form id="trackForm">
            <input type="hidden" id="editId">
            <div class="mb-3">
                <label>Название трека</label>
                <input type="text" id="title" class="form-control" required>
            </div>
            <div class="mb-3">
                <label>ID автора</label>
                <input type="number" id="author_id" class="form-control" required>
                <small class="text-white-50">(ID автора из таблицы authors: 1,2,3...)</small>
            </div>
            <button type="submit" id="submitBtn" class="btn btn-purple">Создать</button>
            <button type="button" id="cancelBtn" class="btn btn-secondary" style="display:none;">Отмена</button>
        </form>
    </div>
</div>

<script src="main.js"></script>
</body>
</html>
